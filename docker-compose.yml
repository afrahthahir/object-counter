version: '3.8'

services:
  webapp:
    build: .
    environment:
      - ENV=prod
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - TFS_HOST=tfserving
      - TFS_PORT=8501
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - tfserving

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"

  tfserving:
    image: tensorflow/serving
    ports:
      - "8501:8501"
    volumes:
      - ./tmp/model:/models
    environment:
      - MODEL_NAME=ssd_mobilenet_v2
